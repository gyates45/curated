name: Update news dashboard

on:
  schedule:
    # Daily at 11:15 UTC (~7:15am US Eastern)
    - cron: "15 11 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest news
        run: python dashboard/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(dashboard): daily news refresh"
            git push
          fi

  # Publishes dashboard/ to GitHub Pages (site root = the dashboard).
  # configure-pages enables Pages on first run, so no Settings visit is needed.
  deploy-pages:
    needs: update
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out main (including any just-pushed data refresh)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
